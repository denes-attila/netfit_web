{% extends "base.html" %}
{% block content %}

<h2>Adja meg az új tanuló adatait:</h2>
<form method="post" action="{{ url_for('tanulok_html.uj_tanulo') }}">
  <label for="nev">Név: </label>
  <input type="text" name="nev" id="nev" placeholder="Név" required/>
  <label for="nem">Nem</label>
  <select name="nem" id="nem" required>
    <option value="fiú">Fiú</option>
    <option value="lány">Lány</option>
    </select>
  <input type="number" name="kor" placeholder="Kor" required/>
  <label for="sportolo">Sportoló</label>
  <select name="sportolo" id="sportolo">
    <option value="igen">Igen</option>
    <option value="nem">Nem</option>
  </select>
  <label for="datum">Mérés ideje: </label>
  <input type="date" name="datum" placeholder="Dátum" required id="datum"/>
  <input type="number" name="suly" placeholder="Súly" required/>
  <input type="number" name="magassag" placeholder="Magasság" required />
  <input type="number" name="testzsir" placeholder="Testzsír" required/>
  <input type="number" name="tavolugrás" placeholder="Tavolugrás" required/>
  <input type="number" name="ingafutas" placeholder="Ingafutás" required/>
  <input type="number" name="fekvotamasz" placeholder="Fekvőtámasz" required/>
  <input type="number" name="hajlekonysag" placeholder="Hajlékonyság" required/>
  <input type="number" name="szoritoeró" placeholder="Szorítóerő" required/>
  <input type="number" name="torzsemeles" placeholder="Törzsemelés" required/>
  <button type="submit">Mentés</button>
</form>

{% endblock %}
