
services:
  web:
    build: .
    ports:
      - "127.0.0.1:5000:5000"
    restart: always
    
    env_file:
    - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
    
  db:
    container_name: postgres
    image: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/data/postgres
      - POSTGRES_DB=netfit
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "attila", "-d", "netfit"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
